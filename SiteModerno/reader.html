  <script>
    (function () {
      const bar = document.getElementById('reading-progress');
      const SHOW_AFTER = 300;   // px from top before bar can appear
      const HIDE_AFTER = 3000;  // ms of inactivity before auto-hiding

      let hideTimer = null;
      let aboveThreshold = false;

      function showUI() {
        if (aboveThreshold) {
          if (bar) bar.style.opacity = '1';
        }
      }

      window.addEventListener('scroll', function () {
        const scrollTop = window.scrollY || document.documentElement.scrollTop;
        const docHeight = document.documentElement.scrollHeight - document.documentElement.clientHeight;

        // Progress bar width
        if (bar && docHeight > 0) {
          bar.style.width = Math.min(100, (scrollTop / docHeight) * 100) + '%';
        }

        // Update threshold flag
        aboveThreshold = scrollTop > SHOW_AFTER;

        if (aboveThreshold) {
          showUI();
        } else {
          clearTimeout(hideTimer);
          if (bar) bar.style.opacity = '0';
        }
      }, { passive: true });

      // Also wake both on touch or mouse move
      ['touchstart', 'mousemove'].forEach(function (evt) {
        window.addEventListener(evt, showUI, { passive: true });
      });
    })();
  </script>
